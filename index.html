<!DOCTYPE html>

<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  /* Cream body */
  --bg:#f7f4ee;--bg2:#fdfcf8;--bg3:#f0ebe0;
  --border:#e6e0d4;--border2:#d4cdc0;
  --text:#1e1c18;--muted:#6e6558;--dim:#a89f92;
  /* Dusty blue — hero */
  --hero-bg:#5b7fa6;--hero-bg2:#4a6d92;--hero-text:#fff;--hero-muted:rgba(255,255,255,0.7);
  /* Terracotta — accent */
  --accent:#c06040;--accent-bg:#f9ede8;--accent-lt:#edc4b4;
  /* Semantic colours — kept compatible */
  --green:#3a7d5a;--green-bg:#e8f4ee;--green-lt:#b8dfc8;
  --amber:#8a6200;--amber-bg:#fff8e6;--amber-lt:#fde99a;
  --red:#b83030;--red-bg:#fdf0f0;--red-lt:#f8c8c8;
  --blue:#3d6494;--blue-bg:#edf2f9;--blue-lt:#b8cce8;
  --tabh:56px;--saveh:48px;
  --border-blue:#c8d8ea;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;font-size:14px;line-height:1.4;display:flex;flex-direction:column;}
/* Layout */

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.tabbar{height:var(–tabh);background:var(–bg2);border-top:1px solid var(–border2);display:flex;flex-shrink:0;}
.tbb{flex:1;border:none;background:transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;font-family:inherit;color:var(–dim);font-size:9px;font-weight:500;padding-top:3px;letter-spacing:.03em;}
.tbb.on{color:var(–accent);}.tbb.on .tbb-icon{background:var(–accent-bg);border-radius:12px;}
.savebar{height:var(–saveh);background:var(–bg2);border-top:1px solid var(–border);padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:8px;}
.savebtn{background:var(–accent);color:#fff;border:none;border-radius:8px;padding:7px 16px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
.savebtn:disabled{opacity:.35;cursor:default;}
.dot{width:7px;height:7px;border-radius:50%;background:#e6aa00;display:inline-block;margin-right:5px;vertical-align:middle;}
/* Overview */
/* Overview hero — dusty blue */
.ov-hero{background:var(–hero-bg);padding:28px 20px 24px;position:relative;overflow:hidden;}

.ov-disc-label{font-size:11px;font-weight:500;color:var(–hero-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px;}
.ov-disc-num{font-size:48px;font-weight:600;letter-spacing:-2px;line-height:1;color:var(–hero-text);}
.ov-disc-num.neg{color:#ffb3a0;}
.ov-per-day{font-size:13px;color:var(–hero-muted);margin-top:6px;}
.ov-per-day strong{color:var(–hero-text);font-weight:600;}
.ov-meta{display:flex;align-items:stretch;gap:10px;margin-top:20px;}
.ov-payday{display:flex;flex-direction:column;gap:2px;cursor:pointer;padding:10px 14px;background:rgba(255,255,255,0.14);border-radius:10px;border:1px solid rgba(255,255,255,0.2);flex:1;}
.ov-payday:active{background:rgba(255,255,255,0.22);}
.ov-payday-num{font-size:22px;font-weight:600;color:var(–hero-text);line-height:1;}
.ov-payday-lbl{font-size:11px;color:var(–hero-muted);line-height:1.4;}
/* Pay period progress */
.ov-progress-wrap{margin-top:16px;}
.ov-progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(–hero-muted);margin-bottom:5px;}
.ov-progress-track{height:6px;background:rgba(255,255,255,0.2);border-radius:3px;overflow:hidden;}
.ov-progress-bar{height:100%;border-radius:3px;background:rgba(255,255,255,0.85);transition:width .3s;}
.ov-progress-runway{position:absolute;height:100%;background:rgba(255,200,120,0.5);border-radius:3px;}
/* Quick update button area */
.ov-actions{display:flex;flex-direction:column;justify-content:center;gap:6px;}
.ov-quickbtn{margin-left:auto;background:var(–accent);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.ov-quickbtn:active{opacity:.85;}
.qu-edit-btn{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.25);color:rgba(255,255,255,0.9);border-radius:8px;padding:5px 12px;font-family:inherit;font-size:11px;font-weight:500;cursor:pointer;margin-top:6px;width:100%;}
.qu-edit-btn:active{opacity:.8;}
.qu-edit-panel{background:var(–bg2);border-top:1px solid var(–border);padding:12px 16px;}
.qu-edit-panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(–muted);margin-bottom:10px;}
.qu-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(–border);background:var(–bg3);color:var(–muted);margin:0 5px 6px 0;}
.qu-chip.on{background:var(–green-bg);border-color:var(–green-lt);color:var(–green);}
.pd-editor{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(–bg2);border-bottom:1px solid var(–border);}
.pd-inp{width:56px;background:var(–bg3);border:1.5px solid var(–accent);border-radius:7px;padding:6px 8px;font-family:inherit;font-size:16px;font-weight:600;color:var(–text);text-align:center;outline:none;}
.pd-save{background:var(–accent);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.pd-cancel{background:transparent;border:none;color:var(–dim);font-size:13px;cursor:pointer;padding:7px 8px;}
/* Hero */
.hero{padding:18px 16px 14px;background:var(–bg2);border-bottom:1px solid var(–border-blue);}
.hero-label{font-size:11px;font-weight:600;color:var(–muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;}
.hero-num{font-size:36px;font-weight:600;letter-spacing:-1px;line-height:1;}
.hero-sub{font-size:12px;color:var(–muted);margin-top:2px;}
.chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
.chip{background:var(–bg3);border:1px solid var(–border);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:500;}
.chip em{color:var(–muted);font-style:normal;font-weight:400;margin-right:3px;}
.chip.g{background:var(–green-bg);border-color:var(–green-lt);color:var(–green);}
.chip.r{background:var(–red-bg);border-color:var(–red-lt);color:var(–red);}
.chip.a{background:var(–amber-bg);border-color:var(–amber-lt);color:var(–amber);}
.chip.b{background:var(–blue-bg);border-color:var(–blue-lt);color:var(–blue);}
/* Sections */
.shdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 3px;cursor:pointer;user-select:none;background:var(–bg);border-bottom:1px solid var(–border-blue);}
.shdr-l{display:flex;align-items:center;gap:5px;}
.sname{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(–muted);}
.stot{font-size:11px;font-weight:600;color:var(–muted);}
.caret{font-size:10px;color:var(–dim);transition:transform .15s;display:inline-block;}
.caret.cl{transform:rotate(-90deg);}
/* Rows */
.row{display:flex;align-items:center;padding:0 16px;min-height:50px;background:var(–bg2);border-bottom:1px solid var(–border-blue);cursor:pointer;gap:10px;transition:background .08s;user-select:none;}
.row:active{background:var(–bg3);}
.row.dragging{opacity:.35;}
.row.drag-over{border-top:2px solid var(–accent);background:var(–blue-bg);}
.drag-handle{color:var(–dim);font-size:16px;cursor:grab;padding:4px 2px;flex-shrink:0;line-height:1;}
.bub{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.bg{background:var(–green);}.ba{background:#e6aa00;}.br{background:var(–red);}.bn{background:var(–dim);}
.rl{flex:1;min-width:0;padding:7px 0;}
.rname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rsub{font-size:11px;color:var(–muted);margin-top:1px;}
.pw{height:3px;background:var(–bg3);border-radius:2px;margin-top:4px;}
.pb{height:100%;border-radius:2px;}
.pbg{background:var(–green);}.pba{background:#e6aa00;}.pbr{background:var(–red);}
.rr{display:flex;align-items:center;gap:7px;flex-shrink:0;}
.rval{font-size:14px;font-weight:600;min-width:72px;text-align:right;}
.vg{color:var(–green);}.vr{color:var(–red);}.va{color:var(–amber);}.vn{color:var(–text);}
.bdg{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;padding:2px 5px;border-radius:4px;}
.bpot{background:var(–amber-bg);color:var(–amber);border:1px solid var(–amber-lt);}
.brec{background:var(–bg3);color:var(–dim);border:1px solid var(–border);}
/* Add forms */
.addtrig{display:flex;align-items:center;gap:6px;padding:9px 16px;font-size:13px;color:var(–dim);cursor:pointer;border-top:1px dashed var(–border);background:var(–bg2);}
.addform{background:var(–bg2);border-top:1px dashed var(–border2);padding:8px 16px;display:flex;gap:7px;align-items:center;}
.ai{background:var(–bg3);border:1px solid var(–border);border-radius:7px;padding:7px 9px;font-family:inherit;font-size:13px;color:var(–text);outline:none;-webkit-appearance:none;}
.ai:focus{border-color:var(–accent);}
.ai-flex{flex:1;}.ai-sm{width:80px;}
.abtn{background:var(–accent);color:#fff;border:none;border-radius:7px;padding:7px 12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.empty-state{padding:20px 16px;text-align:center;color:var(–dim);font-size:13px;}
/* Inspector sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:50;display:none;align-items:flex-end;justify-content:center;transition:background .2s;}
.overlay.open{display:flex;background:rgba(0,0,0,.4);}
.sheet{background:var(–bg2);border-radius:16px 16px 0 0;width:100%;max-width:430px;padding-bottom:env(safe-area-inset-bottom,16px);max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .25s cubic-bezier(.32,.72,0,1);}
.overlay.open .sheet{transform:translateY(0);}
.shandle{width:36px;height:4px;background:var(–border2);border-radius:2px;margin:10px auto 0;}
.stitle{font-size:16px;font-weight:600;padding:14px 18px 0;display:flex;align-items:center;justify-content:space-between;}
.sclose{background:var(–bg3);border:none;border-radius:50%;width:28px;height:28px;font-size:14px;cursor:pointer;color:var(–muted);display:flex;align-items:center;justify-content:center;}
.sbody{padding:14px 18px 0;}
.srow{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(–border-blue);}
.slbl{font-size:13px;color:var(–muted);}
.sval{font-size:13px;font-weight:600;}
.hint{font-size:11px;color:var(–muted);margin-bottom:4px;margin-top:14px;}
.ewrap{display:flex;align-items:center;border:1.5px solid var(–accent);border-radius:8px;padding:5px 10px;background:var(–bg3);}
.einp{flex:1;background:transparent;border:none;font-family:inherit;font-size:16px;font-weight:500;color:var(–text);outline:none;-webkit-appearance:none;min-width:0;}
.btnrow{display:flex;gap:8px;margin-top:10px;}
.bconf{flex:1;background:var(–accent);color:#fff;border:none;border-radius:8px;padding:12px;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.bcanc{background:var(–bg3);color:var(–muted);border:1px solid var(–border);border-radius:8px;padding:12px 14px;font-family:inherit;font-size:14px;cursor:pointer;}
.btop{background:var(–amber-bg);color:var(–amber);border:1px solid var(–amber-lt);border-radius:8px;padding:12px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.btog{width:100%;background:var(–bg3);color:var(–muted);border:1px solid var(–border);border-radius:8px;padding:9px;font-family:inherit;font-size:12px;cursor:pointer;margin-top:8px;}
.bdel{width:100%;background:var(–red-bg);color:var(–red);border:1px solid var(–red-lt);border-radius:8px;padding:9px;font-family:inherit;font-size:12px;cursor:pointer;margin-top:6px;}
.insp-nav{display:flex;gap:8px;margin-top:10px;}
.insp-nav-btn{flex:1;background:var(–bg3);color:var(–muted);border:1px solid var(–border);border-radius:8px;padding:9px;font-family:inherit;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;white-space:nowrap;overflow:hidden;}
.insp-nav-btn:disabled{opacity:.3;cursor:default;}
/* Pot target */
.target-block{margin-top:10px;background:var(–bg3);border-radius:8px;padding:10px 12px;}
.target-block-lbl{font-size:11px;color:var(–muted);margin-bottom:8px;font-weight:500;}
.target-row{display:flex;gap:8px;align-items:flex-end;}
.target-seg{flex:1;}
.target-seg-lbl{font-size:11px;color:var(–muted);margin-bottom:3px;}
.target-inp{width:100%;background:var(–bg2);border:1px solid var(–border);border-radius:7px;padding:6px 8px;font-family:inherit;font-size:13px;color:var(–text);outline:none;-webkit-appearance:none;}
.target-inp:focus{border-color:var(–accent);}
/* Undo toast */
.undo-toast{position:fixed;bottom:calc(var(–tabh) + var(–saveh) + 10px);left:50%;transform:translateX(-50%);background:#1a1a18;color:#fff;border-radius:10px;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:12px;z-index:60;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.25);}
.undo-btn{background:var(–amber-bg);color:var(–amber);border:1px solid var(–amber-lt);border-radius:6px;padding:4px 10px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;}
/* Quick update */
.qu-screen{position:fixed;inset:0;background:var(–bg2);z-index:70;display:flex;flex-direction:column;max-width:430px;margin:0 auto;}
.qu-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(–border);}
.qu-title{font-size:16px;font-weight:600;}
.qu-close{background:var(–bg3);border:none;border-radius:50%;width:32px;height:32px;font-size:15px;cursor:pointer;color:var(–muted);}
.qu-progress{height:3px;background:var(–bg3);}
.qu-progress-bar{height:100%;background:var(–accent);transition:width .3s;}
.qu-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:32px 28px;}
.qu-step-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(–muted);margin-bottom:8px;}
.qu-account-name{font-size:28px;font-weight:600;letter-spacing:-.5px;margin-bottom:4px;}
.qu-current{font-size:14px;color:var(–muted);margin-bottom:32px;}
.qu-current span{color:var(–text);font-weight:600;}
.qu-input-wrap{border:2px solid var(–accent);border-radius:12px;padding:12px 16px;background:var(–bg3);display:flex;align-items:center;margin-bottom:10px;}
.qu-inp{flex:1;background:transparent;border:none;font-family:inherit;font-size:28px;font-weight:600;color:var(–text);outline:none;-webkit-appearance:none;min-width:0;}
.qu-inp-hint{font-size:11px;color:var(–muted);margin-bottom:24px;}
.qu-footer{padding:20px 28px;display:flex;gap:12px;border-top:1px solid var(–border);}
.qu-back{background:var(–bg3);color:var(–muted);border:1px solid var(–border);border-radius:10px;padding:14px 20px;font-family:inherit;font-size:15px;cursor:pointer;}
.qu-next{flex:1;background:var(–accent);color:#fff;border:none;border-radius:10px;padding:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
.qu-done{flex:1;background:var(–green);color:#fff;border:none;border-radius:10px;padding:14px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;}
/* Snapshot / history */
.snap-row{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(–border-blue);background:var(–bg2);gap:10px;}
.snap-restore{background:var(–bg3);border:1px solid var(–border);border-radius:6px;padding:4px 9px;font-family:inherit;font-size:12px;cursor:pointer;color:var(–muted);}
.snap-del{background:transparent;border:none;color:var(–dim);font-size:15px;cursor:pointer;padding:4px 2px;}
.chart-wrap{padding:12px 16px 0;}
.chart-toggle{display:flex;background:var(–bg3);border-radius:8px;padding:3px;gap:3px;margin-bottom:12px;}
.ct-btn{flex:1;border:none;background:transparent;border-radius:6px;padding:6px;font-family:inherit;font-size:12px;font-weight:500;color:var(–muted);cursor:pointer;}
.ct-btn.on{background:var(–bg2);color:var(–text);box-shadow:0 1px 3px rgba(0,0,0,.1);}
.hist-form{background:var(–bg2);border:1px solid var(–border);border-radius:10px;padding:14px;margin:12px 16px;}
.hist-form-title{font-size:13px;font-weight:600;margin-bottom:10px;}
.hist-row{display:flex;gap:8px;align-items:flex-end;}
.hist-inp{background:var(–bg3);border:1px solid var(–border);border-radius:7px;padding:7px 9px;font-family:inherit;font-size:13px;color:var(–text);outline:none;-webkit-appearance:none;flex:1;}
.hist-inp:focus{border-color:var(–accent);}
/* Settings */
.set-section{padding:14px 18px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(–muted);}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(–border-blue);background:var(–bg2);}
.set-lbl{font-size:14px;font-weight:500;}
.set-sub{font-size:12px;color:var(–muted);margin-top:2px;}
.set-block{padding:12px 18px;border-bottom:1px solid var(–border-blue);background:var(–bg2);}
.set-inp{background:var(–bg3);border:1px solid var(–border);border-radius:7px;padding:7px 9px;font-family:inherit;font-size:13px;color:var(–text);outline:none;width:100%;margin-top:6px;-webkit-appearance:none;}
.set-inp:focus{border-color:var(–accent);}
.setup-steps{background:var(–bg3);border-radius:10px;padding:14px 16px;margin:12px 16px;font-size:13px;line-height:1.8;}
.setup-steps ol{padding-left:18px;}
.setup-steps li{margin-bottom:4px;}
.gas-code{background:var(–bg2);border:1px solid var(–border);border-radius:8px;padding:12px;margin:10px 16px;font-family:monospace;font-size:11px;line-height:1.7;white-space:pre;overflow-x:auto;user-select:all;-webkit-user-select:all;word-break:break-all;white-space:pre-wrap;}
/* GS status */
.gs-pill{font-size:11px;font-weight:600;border-radius:6px;padding:4px 10px;border:none;cursor:pointer;font-family:inherit;}
.gs-ok{background:var(–green-bg);color:var(–green);border:1px solid var(–green-lt);}
.gs-idle{background:var(–bg3);color:var(–muted);border:1px solid var(–border);}
/* Op bar */

.op-btn{flex:1;height:44px;border:none;background:transparent;font-size:19px;font-weight:500;color:#1a1a18;cursor:pointer;display:flex;align-items:center;justify-content:center;border-right:1px solid #b0b5bb;-webkit-user-select:none;user-select:none;}
.op-btn:last-child{border-right:none;}
.op-btn:active{background:#b8bcc4;}
input[type=number]{-moz-appearance:textfield;}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;}
</style>

</head><body>

<div class="main" id="main"></div>

<div class="savebar">
  <div id="savemsg"></div>
  <div id="gs-bar" style="display:flex;align-items:center;gap:8px;margin-right:8px;"></div>
  <button class="savebtn" id="savebtn" onclick="doSave()">Save snapshot</button>
</div>

<div class="tabbar" id="tabbar"></div>
<div id="undo-area"></div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeI()">
  <div class="sheet" id="sheet"></div>
</div>
<div id="qu-container"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>

<script>
// ── Constants ─────────────────────────────────────────────────────────────────
var SKEY = 'jake_bv7';
// QUICK_IDS now stored in S.quickIds (see state init below)

var INIT = {
  payday: 25,
  gasUrl: '',
  gasSheetName: 'Budget Snapshots',
  gasSheetUrl: '',
  accounts: [
    {id:'acc1',label:'Account 1',value:0,section:'Current Accounts'},
    {id:'acc2',label:'Account 2',value:0,section:'Current Accounts'},
    {id:'acc3',label:'Account 3',value:0,section:'Current Accounts'},
    {id:'acc4',label:'Account 4',value:0,section:'Current Accounts'},
    {id:'acc5',label:'Account 5',value:0,section:'Current Accounts'},
    {id:'cc1',label:'Credit Card 1',value:0,section:'Credit Cards'},
    {id:'cc2',label:'Credit Card 2',value:0,section:'Credit Cards'},
    {id:'cc3',label:'Credit Card 3',value:0,section:'Credit Cards'},

// ── Calculations ──────────────────────────────────────────────────────────────
function totals(){
  var liq=S.accounts.reduce(function(a,x){return a+x.value;},0);
  var nonLiq=S.nonLiquid.reduce(function(a,x){var share=x.ownerShare!=null?x.ownerShare:1;return a+x.value*share;},0);
  var rec=S.expenses.filter(function(e){return e.type==='recurring';}).reduce(function(a,e){return a+calcRecurringValue(e);},0);
  var pots=S.expenses.filter(function(e){return e.type==='pot';}).reduce(function(a,e){return a+e.value;},0);
  var disc=liq-rec-pots;
  var dob=rec>0?Math.round(disc/(rec/30)):999;
  return {liq:liq,nonLiq:nonLiq,rec:rec,pots:pots,disc:disc,dob:dob};
}
function daysUntilPayday(){
  var today=new Date(), day=today.getDate(), pd=S.payday||25;
  if(day<=pd) return pd-day;
  var next=new Date(today.getFullYear(),today.getMonth()+1,pd);
  return Math.round((next-today)/(1000*60*60*24));
}
function calcRecurringValue(e){
  // Returns the live deduction amount for a recurring expense based on mode
  if(e.type!=='recurring') return e.value;
  var mode=e.recurMode||'manual';
  if(mode==='manual') return e.value;
  var today=new Date();
  var todayDay=today.getDate();
  var pd=S.payday||25;
  // Work out current pay period boundaries (payday-to-payday)
  // lastPayday = most recent payday that has already occurred
  // nextPayday = next upcoming payday
  var lastPayday, nextPayday;
  if(todayDay>=pd){
    lastPayday=new Date(today.getFullYear(),today.getMonth(),pd);
    nextPayday=new Date(today.getFullYear(),today.getMonth()+1,pd);
  } else {
    lastPayday=new Date(today.getFullYear(),today.getMonth()-1,pd);
    nextPayday=new Date(today.getFullYear(),today.getMonth(),pd);
  }
  if(mode==='burn'){
    // Linear burn: full amount on payday, zero the day before next payday
    var totalDays=Math.round((nextPayday-lastPayday)/(1000*60*60*24));
    var daysSincePayday=Math.round((today-lastPayday)/(1000*60*60*24));
    var fraction=totalDays>0?1-(daysSincePayday/totalDays):0;
    return r2(e.monthly*Math.max(0,Math.min(1,fraction)));
  }
  if(mode==='bill'){
    // Bill is "still to come" if its date falls AFTER today within the current pay period,
    // or if it falls between today and the next payday (even across a month boundary).
    // i.e. deduct if the bill hasn't left yet this pay period.
    var billDay=e.billDay||1;
    // Find the next occurrence of billDay on or after today
    var billThisMonth=new Date(today.getFullYear(),today.getMonth(),billDay);
    var billNextMonth=new Date(today.getFullYear(),today.getMonth()+1,billDay);
    // The relevant bill date: whichever of this month or next month falls
    // within [today, nextPayday)
    var billDate;
    if(billThisMonth>=today&&billThisMonth<nextPayday){
      billDate=billThisMonth; // bill is upcoming this month before next payday
    } else if(billNextMonth>=today&&billNextMonth<nextPayday){
      billDate=billNextMonth; // bill is upcoming next month before next payday
    } else {
      billDate=null; // bill already passed this pay period
    }
    return billDate!==null?e.monthly:0;
  }
  return e.value;
}
function potTarget(e){ return e.targetAmount!=null?e.targetAmount:e.monthly*(e.targetMonths||12); }
function ppct(e){ var t=potTarget(e); return t>0?Math.min(100,Math.max(0,(e.value/t)*100)):0; }
function pcls(p){ return p<25?'pbr':p<60?'pba':'pbg'; }
function bubc(v,isPot,pct){ if(v<0)return'br'; if(isPot)return pct<25?'br':pct<60?'ba':'bg'; return v===0?'bn':'bg'; }
function vc(v){ return v>0?'vg':v<0?'vr':'vn'; }
function gbKey(arr,key){ return arr.reduce(function(a,i){(a[i[key]]=a[i[key]]||[]).push(i);return a;},{}); }
function filt(arr){ if(!Q.srch)return arr; var q=Q.srch.toLowerCase(); return arr.filter(function(x){return x.label.toLowerCase().indexOf(q)>-1;}); }
function findIt(id,sec){ return (S[sec]||[]).find(function(x){return x.id===id;}); }
function tabItemList(tab){

  return [];
}

function setMortgageDetails(id,field,val){
  var v=parseFloat(val);
  if(isNaN(v)||v<0) return;
  S.nonLiquid=S.nonLiquid.map(function(x){
    if(x.id!==id) return x;
    var u=Object.assign({},x);
    u[field]=v;
    // When term is set, record the reference date (year+month) so we can auto-decrement
    if(field==='mortgageTerm'){
      var now=new Date();
      u.mortgageTermRefYear=now.getFullYear();
      u.mortgageTermRefMonth=now.getMonth(); // 0-indexed
    }
    return u;
  });
  Q.dirty=true; persist();
  openI(id,'nonLiquid');
}
function effectiveMortgageTerm(it){
  // Derive current remaining term by counting months elapsed since the term was set
  if(!it.mortgageTerm) return null;
  if(!it.mortgageTermRefYear&&it.mortgageTermRefYear!==0) return it.mortgageTerm; // no ref date, use as-is
  var now=new Date();
  var monthsElapsed=(now.getFullYear()-it.mortgageTermRefYear)*12+(now.getMonth()-it.mortgageTermRefMonth);
  return Math.max(0,it.mortgageTerm-monthsElapsed);
}
function calcMortgage(it){
  // Returns {interest, principal, totalInterest, termMonths}
  // using standard amortisation formula
  var balance=Math.abs(it.value);
  var rate=it.mortgageRate; // annual %
  var termMonths=effectiveMortgageTerm(it); // auto-decrements monthly
  var payment=it.mortgagePayment; // monthly payment
  if(!rate||!termMonths||!payment||!balance) return null;
  var r=rate/100/12; // monthly rate
  var interest=r2(balance*r);
  var principal=r2(payment-interest);
  var totalInterest=r2((payment*termMonths)-balance);
  return {interest:interest, principal:principal, totalInterest:Math.max(0,totalInterest), termMonths:termMonths};
}
function setRecurMode(id,mode){
  S.expenses=S.expenses.map(function(e){return e.id===id?Object.assign({},e,{recurMode:mode}):e;});
  Q.dirty=true; persist(); openI(id,'expenses');

// ── Snapshots ─────────────────────────────────────────────────────────────────
function doSave(){
  var T=totals();
  var snap={
    date:new Date().toISOString(),
    netWorth:r2(T.liq+T.nonLiq), liquid:r2(T.liq), disc:r2(T.disc),
    accounts:JSON.parse(JSON.stringify(S.accounts)),
    nonLiquid:JSON.parse(JSON.stringify(S.nonLiquid)),
    expenses:JSON.parse(JSON.stringify(S.expenses))
  };
  S.snapshots.unshift(snap);
  if(S.snapshots.length>20) S.snapshots=S.snapshots.slice(0,20);
  Q.dirty=false;
  Q.saveMsg='Snapshot saved';
  if(Q.saveTmr) clearTimeout(Q.saveTmr);
  Q.saveTmr=setTimeout(function(){Q.saveMsg='';render();},2000);
  persist(); haptic();
  if(S.gasUrl&&S.gasUrl.trim()) gsWriteSnapshot(snap);
  render();
}
function addHistSnap(){
  if(!Q.histDate) return;
  var v=evalE(Q.histNW); if(v===null) return;
  S.snapshots.push({date:new Date(Q.histDate).toISOString(),netWorth:v,liquid:null,disc:null,accounts:[],nonLiquid:[],expenses:[],historical:true});
  S.snapshots.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(S.snapshots.length>20) S.snapshots=S.snapshots.slice(0,20);
  Q.histDate=''; Q.histNW=''; persist(); haptic(); render();
}
function deleteSnap(i){ pushUndo('Deleted snapshot'); S.snapshots.splice(i,1); persist(); render(); }
function restoreSnap(i){
  var snap=S.snapshots[i];
  if(!snap||snap.historical||!snap.accounts.length) return;
  pushUndo('Restored snapshot');
  S.accounts=JSON.parse(JSON.stringify(snap.accounts));
  S.nonLiquid=JSON.parse(JSON.stringify(snap.nonLiquid));
  S.expenses=JSON.parse(JSON.stringify(snap.expenses));
  Q.dirty=true; persist(); haptic(true); render();
}

// ── Add item ──────────────────────────────────────────────────────────────────
function addItem(){
  if(!Q.addLbl.trim()) return;
  var v=evalE(Q.addAmt)||0;
  var id='c'+Date.now();
  var ak=Q.addTo||'';
  if(ak.indexOf('acc_')===0||ak==='nl_liq') S.accounts.push({id:id,label:Q.addLbl.trim(),value:v,section:Q.addSection||'Other'});
  else if(ak.indexOf('exp_')===0) S.expenses.push({id:id,label:Q.addLbl.trim(),value:v,monthly:v,type:'recurring'});
  else if(ak==='nl_nl') S.nonLiquid.push({id:id,label:Q.addLbl.trim(),value:v});

  Q.dirty=true; persist(); haptic(); render();
}

// ── Google Sheets (Apps Script relay) ────────────────────────────────────────
function setSheetMsg(text,type){
  Q.sheetMsg={text:text,type:type};
  if(Q.sheetMsgTmr) clearTimeout(Q.sheetMsgTmr);
  Q.sheetMsgTmr=setTimeout(function(){Q.sheetMsg=null;render();},4000);
}
function buildSheetRows(snap){
  var rows=[];
  var d=new Date(snap.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
  rows.push(['Date',d]);
  rows.push(['Net Worth',snap.netWorth]);
  rows.push(['Liquid',snap.liquid]);
  rows.push(['Discretionary',snap.disc]);
  rows.push(['','']);
  rows.push(['ACCOUNTS','']);
  snap.accounts.forEach(function(a){rows.push([a.label,a.value]);});
  rows.push(['','']);
  rows.push(['NON-LIQUID','']);
  snap.nonLiquid.forEach(function(n){rows.push([n.label,n.value]);});
  rows.push(['','']);
  rows.push(['RECURRING EXPENSES','']);
  snap.expenses.filter(function(e){return e.type==='recurring';}).forEach(function(e){rows.push([e.label,e.value]);});
  rows.push(['','']);
  rows.push(['POTS','']);
  snap.expenses.filter(function(e){return e.type==='pot';}).forEach(function(e){
    rows.push([e.label+' (balance)',e.value]);
    rows.push([e.label+' (target)',r2(potTarget(e))]);
  });
  // Tombstoned (deleted) items — write dash so sheet rows stay consistent
  if(S.deletedItems&&S.deletedItems.length){
    rows.push(['','']);
    rows.push(['DELETED ITEMS','']);
    S.deletedItems.forEach(function(d){rows.push([d.label+' (deleted)','-']);});
  }
  return rows;
}
function gsImportFromSheet(){
  var url = S.gasUrl && S.gasUrl.trim();
  if(!url){ alert('No Apps Script URL set. Go to Settings first.'); return; }
  var sheetName = S.gasSheetName || 'Budget Snapshots';
  Q.sheetSyncing = true; render();
  fetch(url + '?sheet=' + encodeURIComponent(sheetName))
    .then(function(r){ return r.text(); })
    .then(function(text){
      var resp = JSON.parse(text);
      if(resp.status === 'empty'){ setSheetMsg('Sheet is empty — nothing to import','err'); return; }
      if(resp.status !== 'ok'){ setSheetMsg('Import error: '+(resp.error||'unknown'),'err'); return; }
      if(resp.sheetUrl) S.gasSheetUrl = resp.sheetUrl;
      // resp.rows = [{label, value}] in sheet order, with section headers
      var rows = resp.rows;
      var newAccounts = [], newNonLiquid = [], newExpenses = [];
      var section = '';
      var potBalances = {}, potTargets = {};
      var idCounter = Date.now();
      rows.forEach(function(row){
        var lbl = String(row.label).trim();
        var val = row.value;
        // Section headers
        if(lbl==='ACCOUNTS'||lbl==='NON-LIQUID'||lbl==='RECURRING EXPENSES'||lbl==='POTS'||lbl==='DELETED ITEMS'||lbl===''){
          section = lbl; return;
        }
        // Skip summary rows and tombstones
        if(lbl==='Date'||lbl==='Net Worth'||lbl==='Liquid'||lbl==='Discretionary') return;
        if(val==='-'||val==='') return;
        var numVal = parseFloat(val)||0;
        var id = 'imp_'+(idCounter++);
        if(section==='ACCOUNTS'){
          // Try to keep existing account id if label matches
          var existing = S.accounts.find(function(a){return a.label===lbl;});
          newAccounts.push({id:existing?existing.id:id, label:lbl, value:numVal,
            section: existing?existing.section:'Current Accounts'});
        } else if(section==='NON-LIQUID'){
          var exNL = S.nonLiquid.find(function(n){return n.label===lbl;});
          newNonLiquid.push({id:exNL?exNL.id:id, label:lbl, value:numVal});
        } else if(section==='RECURRING EXPENSES'){
          var exE = S.expenses.find(function(e){return e.label===lbl&&e.type==='recurring';});
          newExpenses.push({id:exE?exE.id:id, label:lbl, value:numVal,
            monthly:exE?exE.monthly:numVal, type:'recurring',
            recurMode:exE?exE.recurMode:'manual', billDay:exE?exE.billDay:1});
        } else if(section==='POTS'){
          // Pots come as "Label (balance)" and "Label (target)"
          if(lbl.slice(-10)===' (balance)'){
            var potLbl=lbl.slice(0,-10);
            potBalances[potLbl]=numVal;
          } else if(lbl.slice(-9)===' (target)'){
            var potLbl2=lbl.slice(0,-9);
            potTargets[potLbl2]=numVal;
          }
        }
      });
      // Build pot expenses
      var potLabels = Object.keys(potBalances);
      potLabels.forEach(function(lbl){
        var exP = S.expenses.find(function(e){return e.label===lbl&&e.type==='pot';});
        var target = potTargets[lbl]||0;
        var monthly = exP ? exP.monthly : (target>0?r2(target/12):0);
        var targetMonths = exP ? exP.targetMonths : 12;
        newExpenses.push({id:exP?exP.id:('imp_'+(idCounter++)), label:lbl,
          value:potBalances[lbl], monthly:monthly, type:'pot',
          targetMonths:targetMonths});
      });
      // Replace state
      S.accounts = newAccounts;
      S.nonLiquid = newNonLiquid;
      S.expenses = newExpenses;
      S.lastAccountUpdate = new Date().toDateString();
      // Rebuild quickIds to match new account ids
      S.quickIds = S.accounts.map(function(a){return a.id;});
      Q.dirty = true;
      persist();
      setSheetMsg('Restored '+newAccounts.length+' accounts, '+newExpenses.length+' expenses ✓','ok');
      render();
    })
    .catch(function(err){ setSheetMsg('Import failed: '+err.message,'err'); })
    .finally(function(){ Q.sheetSyncing = false; render(); });
}
function gsWriteSnapshot(snap){
  var url=S.gasUrl&&S.gasUrl.trim();
  if(!url){ setSheetMsg('Paste your Apps Script URL in Settings','err'); render(); return; }
  Q.sheetSyncing=true; render();
  fetch(url,{
    method:'POST',
    headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({sheetName:S.gasSheetName||'Budget Snapshots',rows:buildSheetRows(snap)})
  })
  .then(function(resp){return resp.text();})
  .then(function(text){
    var data=JSON.parse(text);
    if(data.status==='ok'){
      if(data.sheetUrl&&!S.gasSheetUrl){S.gasSheetUrl=data.sheetUrl;persist();}
      setSheetMsg('Saved to Google Sheets \u2713','ok');
    } else {
      setSheetMsg('Sheet error: '+(data.error||'unknown'),'err');
    }
  })
  .catch(function(err){ setSheetMsg('Network error: '+err.message,'err'); })
  .finally(function(){ Q.sheetSyncing=false; render(); });
}

// ── Drag to reorder ───────────────────────────────────────────────────────────
var DS=null, dragHoldTimer=null, dragPending=null, DRAG_HOLD_MS=350;
function dragStart(e,sec,id){
  DS={sec:sec,id:id,overId:null};
  document.querySelectorAll('[data-rowid="'+id+'"]').forEach(function(r){r.classList.add('dragging');});
  haptic();
}
function touchDragStart(e,sec,id){
  var sx=e.touches[0].clientX, sy=e.touches[0].clientY;
  dragPending={sec:sec,id:id,startX:sx,startY:sy};
  dragHoldTimer=setTimeout(function(){
    if(!dragPending) return;
    DS={sec:dragPending.sec,id:dragPending.id,overId:null};
    dragPending=null;
    document.querySelectorAll('[data-rowid="'+id+'"]').forEach(function(r){r.classList.add('dragging');});
    haptic();
  },DRAG_HOLD_MS);
}
function touchDragCancel(){ if(dragHoldTimer){clearTimeout(dragHoldTimer);dragHoldTimer=null;} dragPending=null; }
function dragOver(sec,id){
  if(!DS||DS.sec!==sec||DS.id===id) return;
  DS.overId=id;
  document.querySelectorAll('.row.drag-over').forEach(function(r){r.classList.remove('drag-over');});
  document.querySelectorAll('[data-rowid="'+id+'"]').forEach(function(r){r.classList.add('drag-over');});
}
function dragEnd(){
  touchDragCancel();
  if(!DS) return;
  document.querySelectorAll('.row.dragging,.row.drag-over').forEach(function(r){r.classList.remove('dragging','drag-over');});
  if(DS.overId&&DS.overId!==DS.id){
    var arr=S[DS.sec];
    var fi=arr.findIndex(function(x){return x.id===DS.id;});
    var ti=arr.findIndex(function(x){return x.id===DS.overId;});
    if(fi>-1&&ti>-1){
      pushUndo('Reordered items');
      var item=arr.splice(fi,1)[0]; arr.splice(ti,0,item);
      Q.dirty=true; persist(); render();
    }
  }
  DS=null;
}
function onTM(e){
  if(dragPending&&!DS){
    var dx=e.touches[0].clientX-dragPending.startX, dy=e.touches[0].clientY-dragPending.startY;
    if(Math.sqrt(dx*dx+dy*dy)>8) touchDragCancel();
    return;
  }
  if(!DS) return;
  e.preventDefault();
  var el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  var row=el&&el.closest('[data-rowid]');
  if(row) dragOver(DS.sec,row.dataset.rowid);
}
document.addEventListener('touchmove',onTM,{passive:false});
document.addEventListener('touchend',dragEnd);
document.addEventListener('touchcancel',dragEnd);
document.addEventListener('mouseup',dragEnd);

// ── GAS code string (shown in settings) ──────────────────────────────────────
var GAS_CODE = [
  'function doGet(e) {',
  '  var name = (e && e.parameter && e.parameter.sheet) || "Budget Snapshots";',
  '  var ss = getOrCreateSheet(name);',
  '  var sheet = ss.getSheets()[0];',
  '  var lastRow = sheet.getLastRow();',
  '  var lastCol = sheet.getLastColumn();',
  '  if (lastRow < 1 || lastCol < 2) {',
  '    return ContentService.createTextOutput(JSON.stringify({status:"empty"}))',
  '      .setMimeType(ContentService.MimeType.JSON);',
  '  }',
  '  // Read col A (labels) and last data column (most recent snapshot)',
  '  var labels = sheet.getRange(1, 1, lastRow, 1).getValues().map(function(r){return r[0];});',
  '  var values = sheet.getRange(1, lastCol, lastRow, 1).getValues().map(function(r){return r[0];});',
  '  var rows = labels.map(function(lbl,i){return {label:lbl,value:values[i]};});',
  '  return ContentService.createTextOutput(JSON.stringify({status:"ok",rows:rows,sheetUrl:ss.getUrl()}))',
  '    .setMimeType(ContentService.MimeType.JSON);',
  '}',
  'function doPost(e) {',
  '  var data = JSON.parse(e.postData.contents);',
  '  var ss = getOrCreateSheet(data.sheetName || "Budget Snapshots");',
  '  var sheet = ss.getSheets()[0];',
  '  var rows = data.rows;',
  '  var nextCol = Math.max(2, sheet.getLastColumn() + 1);',
  '  var lastRow = sheet.getLastRow();',
  '  var labelMap = {};',
  '  if (lastRow > 0) {',
  '    var existingLabels = sheet.getRange(1, 1, lastRow, 1).getValues();',
  '    existingLabels.forEach(function(r, i) { if(r[0]) labelMap[r[0]] = i + 1; });',
  '  }',
  '  rows.forEach(function(row) {',
  '    var label = row[0]; var value = row[1]; var rowNum;',
  '    if (labelMap[label]) { rowNum = labelMap[label]; }',
  '    else { lastRow++; rowNum = lastRow; sheet.getRange(rowNum, 1).setValue(label); labelMap[label] = rowNum; }',
  '    sheet.getRange(rowNum, nextCol).setValue(value);',
  '  });',
  '  return ContentService',
  '    .createTextOutput(JSON.stringify({status:"ok",sheetUrl:ss.getUrl()}))',
  '    .setMimeType(ContentService.MimeType.JSON);',
  '}',
  'function getOrCreateSheet(name) {',
  '  var files = DriveApp.getFilesByName(name);',
  '  if (files.hasNext()) return SpreadsheetApp.open(files.next());',
  '  return SpreadsheetApp.create(name);',
  '}'
].join('\n');

        +'<span style="font-size:15px">&#x26A0;&#xFE0F;</span>'
        +'<div><div style="font-size:12px;font-weight:600;color:var(--amber)">Balances not updated today</div>'
        +'<div style="font-size:11px;color:var(--amber)">Ready to spend may be inaccurate</div></div>'
        +'</div>'
      :'')
      +'<div style="padding:14px 16px 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)">Accounts</div>'
      +acctSections.map(function(entry){
        var sname=entry[0], sitems=entry[1];
        var stot=sitems.reduce(function(a,x){return a+x.value;},0);
        var sc=stot<0?'vr':stot===0?'':'vg';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px;border-bottom:1px solid var(--border);background:var(--bg2)">'
          +'<span style="font-size:13px;color:var(--muted)">'+esc(sname)+'</span>'
          +'<span style="font-size:14px;font-weight:600" class="'+sc+'">'+fmt(stot)+'</span>'
          +'</div>';
      }).join('')
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--border)">'
      +[['Liquid',fmt(T.liq),''],['In pots',fmt(T.pots),'va']].map(function(x){
        return '<div style="background:var(--bg2);padding:12px 14px">'
          +'<div style="font-size:11px;color:var(--muted);margin-bottom:3px">'+x[0]+'</div>'
          +'<div style="font-size:15px;font-weight:600" class="'+x[2]+'">'+x[1]+'</div>'
          +'</div>';
      }).join('')
      +'</div>';
  // ── Accounts ────────────────────────────────────────────────────────────────
  } else if(Q.tab==='accounts'){
    html=Object.entries(gbKey(S.accounts,'section')).map(function(e){return secHtml(e[0],e[1],'accounts','acc_'+e[0].replace(/\W/g,'_'));}).join('');

  // ── Expenses ────────────────────────────────────────────────────────────────
  } else if(Q.tab==='expenses'){
    var recItems=S.expenses.filter(function(e){return e.type==='recurring';});
    var potItems=S.expenses.filter(function(e){return e.type==='pot';});
    html='<div class="hero" style="padding:12px 16px 10px"><div class="chips" style="margin-top:0">'
      +'<div class="chip r"><em>recurring/mo</em>'+fmt(T.rec)+'</div>'
      +'<div class="chip a"><em>pot balances</em>'+fmt(T.pots)+'</div>'
      +'</div></div>'
      +secHtml('Recurring',recItems,'expenses','exp_rec')
      +secHtml('Pots',potItems,'expenses','exp_pot');

  // ── Net Worth ────────────────────────────────────────────────────────────────
  } else if(Q.tab==='net'){
    html='<div class="hero" style="padding:14px 16px 10px">'
      +'<div class="hero-label">Net Worth</div>'
      +'<div class="hero-num vn">'+fmt(T.liq+T.nonLiq)+'</div>'
      +'</div>'
      +secHtml('Liquid',S.accounts,'accounts','nl_liq')
      +secHtml('Non-Liquid',S.nonLiquid,'nonLiquid','nl_nl');

  // ── History ──────────────────────────────────────────────────────────────────
  } else if(Q.tab==='history'){
    var snaps=S.snapshots;
    html='<div class="hero" style="padding:14px 16px 10px">'
      +'<div class="hero-label">Net Worth Over Time</div>'
      +'<div class="hero-sub">'+snaps.length+' snapshot'+(snaps.length!==1?'s':'')+' &middot; tap Save snapshot to record today</div>'
      +'</div>'
      +'<div class="chart-wrap">'
      +'<div class="chart-toggle">'
      +'<button class="ct-btn '+(Q.chartType==='line'?'on':'')+'" onclick="Q.chartType=\'line\';render()">Line</button>'
      +'<button class="ct-btn '+(Q.chartType==='bar'?'on':'')+'" onclick="Q.chartType=\'bar\';render()">Bar</button>'
      +'</div>'
      +(snaps.length>=2?'<canvas id="nwchart" height="180"></canvas>':'<div class="empty-state">Save 2+ snapshots to see chart</div>')
      +'</div>'
      +'<div class="hist-form"><div class="hist-form-title">Add historical data point</div>'
      +'<div class="hist-row">'
      +'<div style="display:flex;flex-direction:column;gap:3px;flex-shrink:0">'
      +'<span style="font-size:11px;font-weight:500;color:var(--muted)">Date</span>'
      +'<input class="hist-inp" type="date" value="'+Q.histDate+'" oninput="Q.histDate=this.value" style="max-width:135px;flex:none">'
      +'</div>'
      +'<input class="hist-inp" type="text" inputmode="decimal" placeholder="Net worth e.g. 45000" value="'+esc(Q.histNW)+'" oninput="Q.histNW=this.value" onkeydown="if(event.key===\'Enter\')addHistSnap()">'
      +'<button class="abtn" onclick="addHistSnap()">Add</button>'
      +'</div></div>';
    if(snaps.length){
      html+='<div style="padding:10px 16px 4px"><span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">All snapshots</span></div>';
      html+=snaps.map(function(s,i){
        var d=new Date(s.date).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
        return '<div class="snap-row">'
          +'<div class="rl">'
          +'<div class="rname" style="font-size:13px">'+d+(s.historical?' <span style="font-size:10px;color:var(--dim)">(historical)</span>':'')+'</div>'
          +'<div class="rsub">Net worth '+fmt(s.netWorth)+(s.disc!=null?' &middot; discretionary '+fmt(s.disc):'')+'</div>'
          +'</div>'
          +(!s.historical&&s.accounts&&s.accounts.length?'<button class="snap-restore" onclick="restoreSnap('+i+')">Restore</button>':'')
          +'<button class="snap-del" onclick="deleteSnap('+i+')">&#x2715;</button>'
          +'</div>';
      }).join('');
    } else {
      html+='<div class="empty-state">No snapshots yet</div>';
    }

  // ── Settings ─────────────────────────────────────────────────────────────────
  } else if(Q.tab==='settings'){
    html='<div class="hero" style="padding:14px 16px 12px">'
      +'<div class="hero-label">Settings</div>'
      +'</div>'
      +'<div class="set-section">Google Sheets sync</div>'
      +'<div class="set-block">'
      +'<div class="set-lbl">Apps Script URL</div>'
      +'<div class="set-sub">Paste the URL from your deployed Google Apps Script</div>'
      +'<input class="set-inp" type="text" placeholder="https://script.google.com/macros/s/..." value="'+esc(S.gasUrl||'')+'" oninput="S.gasUrl=this.value.trim();persist();render()">'
      +'</div>'
      +(S.gasUrl
        ? '<div class="set-row">'
          +'<div><div class="set-lbl" style="color:var(--green)">&#x2713; Connected</div>'
          +'<div class="set-sub">Snapshots sync automatically on save</div></div>'
          +'<button style="font-size:12px;color:var(--red);background:transparent;border:none;cursor:pointer;padding:4px 0" onclick="S.gasUrl=\'\';S.gasSheetUrl=\'\';persist();render()">Disconnect</button>'
          +'</div>'
          +'<div class="set-row">'
          +'<div><div class="set-lbl">Restore from sheet</div>'
          +'<div class="set-sub">Imports latest snapshot values into the app</div></div>'
          +'<button style="font-size:12px;font-weight:600;color:var(--blue);background:var(--blue-bg);border:1px solid var(--blue-lt);border-radius:7px;padding:5px 12px;cursor:pointer;font-family:inherit" onclick="if(confirm(\'Replace all current app data with the latest snapshot from Google Sheets?\'))gsImportFromSheet()">'
          +(Q.sheetSyncing?'Importing…':'Import ↓')
          +'</button>'
          +'</div>'
        : '')
      +(S.gasSheetUrl
        ? '<div class="set-row">'
          +'<div><div class="set-lbl">Open snapshot sheet</div><div class="set-sub">'+esc(S.gasSheetName||'Budget Snapshots')+'</div></div>'
          +'<a href="'+esc(S.gasSheetUrl)+'" target="_blank" style="font-size:12px;color:var(--blue);font-weight:600;text-decoration:none">Open &#x2192;</a>'
          +'</div>'
        : '')
      +'<div class="set-section">Sheet name</div>'
      +'<div class="set-block">'
      +'<div class="set-sub">Name used when the sheet is first created</div>'
      +'<input class="set-inp" type="text" value="'+esc(S.gasSheetName||'Budget Snapshots')+'" oninput="S.gasSheetName=this.value;persist()">'
      +'</div>'
      +'<div class="setup-steps">'
      +'<strong style="font-size:13px">One-time setup (~5 min)</strong>'
      +'<ol style="margin-top:10px">'
      +'<li>Go to <a href="https://script.google.com" target="_blank">script.google.com</a> &rarr; <strong>New project</strong></li>'
      +'<li>Delete any existing code, paste in the script below</li>'
      +'<li><strong>Deploy &rarr; New deployment</strong></li>'
      +'<li>Type: <strong>Web app</strong> &bull; Execute as: <strong>Me</strong> &bull; Who has access: <strong>Anyone</strong></li>'
      +'<li>Click Deploy, authorise when prompted, copy the web app URL</li>'
      +'<li>Paste the URL in the field above</li>'
      +'<li>Save a snapshot &mdash; your sheet is created automatically</li>'
      +'</ol>'
      +'</div>'
      +'<div style="padding:8px 16px 4px"><span style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)">Apps Script code</span></div>'
      +'<div class="gas-code" id="gas-code">'+esc(GAS_CODE)+'</div>'
      +'<div style="padding:6px 16px 20px"><button onclick="if(navigator.clipboard)navigator.clipboard.writeText(GAS_CODE)" style="background:var(--bg3);border:1px solid var(--border);border-radius:7px;padding:7px 14px;font-family:inherit;font-size:13px;cursor:pointer;color:var(--muted)">Copy script</button></div>';
  }

  document.getElementById('main').innerHTML=html;

  if(Q.tab==='history'&&S.snapshots.length>=2) requestAnimationFrame(drawChart);
  if(Q.tab==='overview'&&Q.editPayday) setTimeout(function(){var el=document.getElementById('pd-inp');if(el){el.focus();el.select();}},60);

  // Inspector sheet
  var ov=document.getElementById('overlay'), sh=document.getElementById('sheet');
  var it=Q.inspId?findIt(Q.inspId,Q.inspSec):null;
  if(it){
    sh.innerHTML=inspHtml(it);
    ov.classList.add('open');
    setTimeout(function(){var el=document.getElementById('einp');if(el){el.focus();el.select();}},80);
  } else {
    ov.classList.remove('open'); sh.innerHTML='';
  }

  renderUndoToast();
}


render();
</script>

</body></html>
